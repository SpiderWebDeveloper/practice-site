<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>はじめてのサイト</title>
  <style>
    /* ここからCSS（デザインの指示） */
    body {
      background-color: #f0f8ff; /* 薄い水色 */
      text-align: center;       /* 文字を真ん中に寄せる */
      font-family: sans-serif;  /* 文字の形をスッキリさせる */
      padding-top: 100px;       /* 上に少し余白を作る */
    }
    h1 {
      color: #333333;           /* 見出しの色 */
      font-size: 48px;          /* 文字を大きくする */
    }
    p {
      color: #666666;           /* 本文の色 */
    }
  </style>
</head>
<body>

  <h1>はじめてのサイト</h1>
  <p>GitHub練習中です。CSSでデザインを変えてみました！</p>

</body>
</html>
