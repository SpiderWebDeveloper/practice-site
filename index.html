<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ULTRA DOHADE SITE</title>
  
  <style>
    /* 1. 全体のデザイン & 動く背景 */
    body {
      background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
      background-size: 400% 400%;
      animation: gradient_bg 15s ease infinite;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      margin: 0;
      font-family: 'Helvetica Neue', Arial, sans-serif;
      overflow: hidden; /* 画面からはみ出す演出用 */
      color: white;
    }

    @keyframes gradient_bg {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* 2. パーティクル（粒子）背景（JavaScriptで動かす用） */
    #particles-js {
      position: absolute;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      z-index: 1; /* コンテンツの後ろに */
    }

    /* 3. コンテンツ全体を中央に */
    .content {
      position: relative;
      z-index: 10; /* パーティクルの前に */
      text-align: center;
      display: flex;
      flex-direction: column;
      gap: 30px; /* 要素間の隙間 */
    }

    /* 4. タイトル：虹色に揺れる */
    h1 {
      font-size: 6vw;
      text-transform: uppercase;
      letter-spacing: 5px;
      margin: 0;
      background: linear-gradient(90deg, #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #4b0082, #9400d3);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: rainbow 5s ease infinite, float 3s ease-in-out infinite;
    }

    @keyframes rainbow {
      0% { background-position: 0% 50%; }
      100% { background-position: 100% 50%; }
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-20px); }
    }

    /* 5. ド派手ボタン */
    .super-button {
      background-color: rgba(255, 255, 255, 0.9);
      color: #333;
      padding: 15px 30px;
      font-size: 20px;
      font-weight: bold;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 10px 20px rgba(0,0,0,0.3);
      text-transform: uppercase;
    }

    .super-button:hover {
      transform: scale(1.05) translateY(-3px);
      box-shadow: 0 15px 30px rgba(255, 255, 255, 0.4);
    }

    /* 6. おみくじ結果表示 & 演出 */
    #omikuji-result {
      font-size: 60px;
      font-weight: bold;
      margin-top: 20px;
      text-shadow: 0 0 15px rgba(255,255,255,0.7);
      animation: result_show 1s ease-out; /* 結果が出るときのアニメ */
    }

    @keyframes result_show {
      0% { opacity: 0; transform: scale(0.5) rotate(-30deg); }
      100% { opacity: 1; transform: scale(1) rotate(0deg); }
    }

    /* 結果ごとの背景演出（JavaScriptでクラスを付ける） */
    body.result-great { background: radial-gradient(circle, #ffeb3b, #ff7043) !important; animation: none; } /* 大吉は黄金 */
    body.result-good { background: radial-gradient(circle, #81c784, #388e3c) !important; animation: none; } /* 吉は緑 */
    body.result-bad { background: radial-gradient(circle, #757575, #212121) !important; animation: none; } /* 凶は灰色 */

    /* コンフェッティ（紙吹雪）（JavaScriptで作成用） */
    .confetti {
      position: absolute;
      width: 10px;
      height: 10px;
      background-color: gold;
      border-radius: 50%;
      animation: confetti_fall 2s ease-out;
      opacity: 0;
      z-index: 5;
    }

    @keyframes confetti_fall {
      0% { opacity: 1; transform: translateY(-50px) rotate(0deg); }
      100% { opacity: 0; transform: translateY(100vh) rotate(720deg); }
    }

    /* 7. ゲームエリア */
    #game-area {
      background-color: rgba(255, 255, 255, 0.1);
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }

    #timer { font-size: 24px; color: #ffeb3b; }
    #score { font-size: 40px; font-weight: bold; }

  </style>
</head>
<body class="">

  <div id="particles-js"></div>

  <div class="content">
    
    <h1>ULTRA<br>DOHADE SITE</h1>

    <div id="game-area">
      <p>3秒クリック連打ゲーム！</p>
      <div id="timer">準備完了</div>
      <button id="click-btn" class="super-button" onclick="startGame()">ゲーム開始！</button>
      <p>スコア: <span id="score">0</span></p>
    }
    </div>

    <div id="omikuji-area">
      <button class="super-button" onclick="omikuji()">今日の運勢！</button>
      <div id="omikuji-result"></div>
    }
    </div>

  </div>
